<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockPro — Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060612;--card:#0d0d2b;--border:#1a1a4e;--accent:#06b6d4;--text:#e2e8f0;--muted:#64748b}
body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center}
.bg-orbs{position:fixed;inset:0;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:float 8s ease-in-out infinite}
.orb1{width:400px;height:400px;background:rgba(6,182,212,0.2);top:-100px;right:-100px}
.orb2{width:300px;height:300px;background:rgba(124,58,237,0.2);bottom:-100px;left:-100px;animation-delay:4s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.container{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}
.card{background:rgba(13,13,43,0.85);border:1px solid var(--border);border-radius:24px;padding:40px;backdrop-filter:blur(20px)}
.back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:24px;transition:.2s}
.back:hover{color:var(--text)}
.icon{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),#0ea5e9);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 0 20px;font-size:28px}
h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;margin-bottom:8px}
p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:28px}
.form-group{margin-bottom:20px}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
.input-wrap{position:relative}
.input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}
input{width:100%;padding:13px 14px 13px 42px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;transition:.3s;outline:none}
input:focus{border-color:var(--accent);background:rgba(6,182,212,0.08);box-shadow:0 0 0 3px rgba(6,182,212,0.15)}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),#0ea5e9);color:#fff;font-size:15px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;transition:.3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(6,182,212,0.4)}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;align-items:center;gap:10px}
.alert.error{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;display:flex}
.alert.success{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;display:flex}
.step{display:none}.step.active{display:block}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="container">
  <div class="card">
    <a href="login.html" class="back"><i class="fas fa-arrow-left"></i> Back to Login</a>
    <div id="alert" class="alert"></div>

    <div id="step1" class="step active">
      <div class="icon">🔑</div>
      <h1>Forgot Password?</h1>
      <p>Enter your registered email and we'll send you a reset link.</p>
      <form id="forgotForm">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" id="fpEmail" placeholder="your@email.com" required>
          </div>
        </div>
        <button type="submit" class="btn">Send Reset Link →</button>
      </form>
    </div>

    <div id="step2" class="step">
      <div class="icon">✅</div>
      <h1>Check Your Email!</h1>
      <p>A password reset link has been sent to your email address. Enter the token and new password below.</p>
      <form id="resetForm">
        <div class="form-group">
          <label>Reset Token</label>
          <div class="input-wrap">
            <i class="fas fa-key"></i>
            <input type="text" id="resetToken" placeholder="Paste reset token" required>
          </div>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="newPass" placeholder="Min 6 characters" required>
          </div>
        </div>
        <button type="submit" class="btn">Reset Password →</button>
      </form>
    </div>
  </div>
</div>
<script>
function showAlert(msg, type='error') {
  const el = document.getElementById('alert');
  el.className = `alert ${type}`;
  el.innerHTML = `<i class="fas fa-${type==='error'?'exclamation-circle':'check-circle'}"></i> ${msg}`;
  el.style.display='flex';
}
document.getElementById('forgotForm').addEventListener('submit', async e => {
  e.preventDefault();
  try {
    const res = await fetch('/api/auth/forgot-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email: document.getElementById('fpEmail').value})
    });
    const data = await res.json();
    if (data.success) {
      showAlert(data.message, 'success');
      if (data.resetToken) document.getElementById('resetToken').value = data.resetToken;
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
    } else showAlert(data.message);
  } catch { showAlert('Connection error.'); }
});
document.getElementById('resetForm').addEventListener('submit', async e => {
  e.preventDefault();
  try {
    const res = await fetch('/api/auth/reset-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({token: document.getElementById('resetToken').value, password: document.getElementById('newPass').value})
    });
    const data = await res.json();
    if (data.success) {
      showAlert(data.message, 'success');
      setTimeout(() => window.location.href='login.html', 1500);
    } else showAlert(data.message);
  } catch { showAlert('Connection error.'); }
});
</script>
</body>
</html>
